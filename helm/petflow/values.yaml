image:
  repository: 160885257498.dkr.ecr.eu-central-1.amazonaws.com/petflow-api
  tag: latest
  pullPolicy: Always

replicaCount: 1

serviceAccount:
  name: petflow-api

service:
  type: ClusterIP
  port: 80
  targetPort: 5000

ingress:
  enabled: true
  host: petflow.shaked.in
  certificateArn: arn:aws:acm:eu-central-1:160885257498:certificate/8a3b79d0-f8c5-4d12-a582-73ecee59abc9

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  averageCpuUtilization: 60
