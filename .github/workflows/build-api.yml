name: Build and Push PetFlow API

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/build-api.yml"

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: petflow-api

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Run tests
        working-directory: app
        run: |
          pip install -r requirements.txt
          pytest
      
      - name: Scan Infrastructure with Checkov
        continue-on-error: true
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra
          framework: terraform
          output_format: cli
      
      - name: Scan Python Code with Bandit
        continue-on-error: true
        working-directory: app
        run: |
          pip install bandit
          bandit -r . -f txt

      - name: Build, tag, and push image
        working-directory: app
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE_URI=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${{ github.sha }}

          docker build -t petflow-api .
          docker tag petflow-api:latest $IMAGE_URI
          docker push $IMAGE_URI

          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV
          echo "Pushed $IMAGE_URI"

      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name petflow-cluster

      - name: Deploy to EKS
        run: |
          kubectl set image deployment/petflow-api \
            petflow-api=$IMAGE_URI \
            -n default

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/petflow-api -n default
